services:
  pkm-bot:
    #image: peterluxem/obsidian-ai-agent:latest
    build: . # Uncomment to build locally instead of pulling from Docker Hub
    container_name: obsidian-ai-agent
    env_file:
      - .env.docker
    environment:
      - TZ=${TZ:-Europe/Brussels}
      - CONFIG_PATH=/app/config.yaml
    volumes:
      # Mount your Obsidian vault (HOST_VAULT_PATH from .env)
      - ${HOST_VAULT_PATH:-./.vault}:/app/vault
      # Mount config file into the container
      - ${HOST_CONFIG_PATH:-./config.docker.yaml}:/app/config.yaml:ro
      # Mount SSH keys read-only; entrypoint copies them to /home/botuser/.ssh
      - ${HOST_SSH_DIR:-~/.ssh}:/tmp/.ssh-host:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
